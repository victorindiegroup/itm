<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1D9E75">
<title>ITM — Indie Group</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F6F2;
    --surface: #FFFFFF;
    --surface-2: #FBFAF5;
    --ink: #1B1B18;
    --ink-2: #5A5A52;
    --ink-3: #8F8E85;
    --border: #E5E3DA;
    --border-strong: #D4D2C6;
    --accent: #1D9E75;
    --accent-dark: #0F6E56;
    --accent-soft: #E1F5EE;
    --btl: #D4A017;
    --btl-soft: #FAEEDA;
    --lit: #378ADD;
    --lit-soft: #E6F1FB;
    --danger: #C04343;
    --radius-s: 8px;
    --radius: 12px;
    --radius-l: 18px;
    --shadow-1: 0 1px 2px rgba(27,27,24,.04), 0 2px 8px rgba(27,27,24,.04);
    --shadow-2: 0 4px 16px rgba(27,27,24,.08), 0 12px 40px rgba(27,27,24,.08);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: 'DM Sans', system-ui, sans-serif; font-size: 15px; line-height: 1.4; height: 100%; overscroll-behavior: none; }
  body { display: flex; flex-direction: column; min-height: 100vh; min-height: 100dvh; overflow: hidden; }
  .mono { font-family: 'DM Mono', ui-monospace, monospace; }
  button { font-family: inherit; font-size: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  input, select { font-family: inherit; font-size: inherit; color: inherit; }
  input:focus, select:focus, button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  /* HEADER */
  header { display: flex; align-items: center; gap: 10px; padding: 14px 16px 12px; background: var(--bg); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .logo { width: 36px; height: 36px; border-radius: 10px; background: var(--accent); display: grid; place-items: center; color: #fff; font-weight: 700; font-size: 15px; letter-spacing: .5px; }
  .h-main { flex: 1; min-width: 0; }
  .h-title { font-weight: 700; font-size: 16px; line-height: 1.1; }
  .h-sub { font-size: 12px; color: var(--ink-2); margin-top: 2px; }
  .estab-pill { display: inline-flex; align-items: center; gap: 6px; padding: 6px 10px; border-radius: 20px; background: var(--surface); border: 1px solid var(--border); font-size: 13px; font-weight: 500; }
  .estab-pill:active { background: var(--surface-2); }
  .zone-pill { padding: 6px 12px; border-radius: 20px; background: var(--accent-soft); color: var(--accent-dark); font-size: 13px; font-weight: 500; display: inline-flex; align-items: center; gap: 6px; }
  .zone-pill:active { opacity: .7; }

  /* TABS */
  .tabs { display: flex; gap: 4px; padding: 0 16px; background: var(--bg); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .tab { padding: 12px 14px; font-size: 14px; font-weight: 500; color: var(--ink-2); border-bottom: 2px solid transparent; margin-bottom: -1px; position: relative; }
  .tab.active { color: var(--ink); border-bottom-color: var(--accent); }
  .tab .badge { display: inline-block; margin-left: 6px; padding: 1px 7px; font-size: 11px; font-weight: 500; background: var(--accent); color: #fff; border-radius: 10px; min-width: 20px; text-align: center; }
  .tab:not(.active) .badge { background: var(--border-strong); color: var(--ink-2); }

  /* MAIN */
  main { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 80px; }
  .view { display: none; }
  .view.active { display: block; }

  /* SEARCH */
  .search-wrap { padding: 12px 16px 8px; background: var(--bg); position: sticky; top: 0; z-index: 10; }
  .search { width: 100%; padding: 12px 14px 12px 40px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); font-size: 15px; box-shadow: var(--shadow-1); }
  .search:focus { border-color: var(--accent); outline: none; }
  .search-ico { position: absolute; left: 30px; top: 50%; transform: translateY(-50%); color: var(--ink-3); font-size: 16px; pointer-events: none; }
  .search-wrap { position: sticky; }

  /* PRODUIT LIST */
  .prod-list { padding: 4px 16px 16px; }
  .prod-empty { padding: 40px 20px; text-align: center; color: var(--ink-2); font-size: 14px; }
  .prod-cat-title { font-size: 11px; font-weight: 700; color: var(--ink-3); letter-spacing: 1px; text-transform: uppercase; padding: 12px 4px 6px; }
  .prod { padding: 12px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 6px; display: flex; align-items: center; gap: 10px; }
  .prod:active { background: var(--surface-2); transform: scale(.995); }
  .prod-name { flex: 1; font-size: 14px; font-weight: 500; line-height: 1.3; min-width: 0; word-break: break-word; }
  .prod-tag { font-size: 10px; font-weight: 700; letter-spacing: .5px; padding: 2px 7px; border-radius: 10px; flex-shrink: 0; }
  .tag-btl { background: var(--btl-soft); color: #854F0B; }
  .tag-lit { background: var(--lit-soft); color: #0C447C; }
  .prod-saisi { position: relative; }
  .prod-saisi::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent); border-radius: 3px 0 0 3px; }

  /* SESSION LIST */
  .sess-list { padding: 12px 16px 16px; }
  .sess-zone { font-size: 11px; font-weight: 700; color: var(--ink-3); letter-spacing: 1px; text-transform: uppercase; padding: 16px 4px 8px; display: flex; align-items: center; gap: 8px; }
  .sess-zone-count { background: var(--border); color: var(--ink-2); font-size: 11px; padding: 1px 8px; border-radius: 10px; font-weight: 500; letter-spacing: 0; }
  .sess-item { padding: 12px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 6px; display: flex; align-items: center; gap: 10px; }
  .sess-item:active { background: var(--surface-2); }
  .sess-body { flex: 1; min-width: 0; }
  .sess-name { font-size: 14px; font-weight: 500; line-height: 1.3; margin-bottom: 2px; word-break: break-word; }
  .sess-detail { font-size: 12px; color: var(--ink-2); }
  .sess-detail .mono { font-size: 12px; }
  .sess-del { width: 32px; height: 32px; border-radius: 50%; display: grid; place-items: center; color: var(--ink-3); font-size: 18px; flex-shrink: 0; }
  .sess-del:active { background: #FCEBEB; color: var(--danger); }

  /* FAB ZONE */
  .fab-zone { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 20; }
  .btn-primary { padding: 13px 22px; background: var(--accent); color: #fff; border-radius: 100px; font-weight: 500; font-size: 15px; box-shadow: var(--shadow-2); display: inline-flex; align-items: center; gap: 8px; }
  .btn-primary:active { background: var(--accent-dark); transform: scale(.97); }
  .btn-sec { padding: 13px 18px; background: var(--surface); color: var(--ink); border: 1px solid var(--border); border-radius: 100px; font-weight: 500; font-size: 14px; box-shadow: var(--shadow-1); }
  .btn-sec:active { background: var(--surface-2); }

  /* BOTTOM SHEET */
  .overlay { position: fixed; inset: 0; background: rgba(27,27,24,.45); z-index: 50; opacity: 0; pointer-events: none; transition: opacity .2s; }
  .overlay.open { opacity: 1; pointer-events: auto; }
  .sheet { position: fixed; left: 0; right: 0; bottom: 0; background: var(--surface); border-radius: var(--radius-l) var(--radius-l) 0 0; z-index: 51; transform: translateY(100%); transition: transform .25s cubic-bezier(.3,0,.2,1); max-height: 92vh; max-height: 92dvh; display: flex; flex-direction: column; }
  .sheet.open { transform: translateY(0); }
  .sheet-handle { width: 44px; height: 4px; background: var(--border-strong); border-radius: 2px; margin: 10px auto 6px; flex-shrink: 0; }
  .sheet-head { padding: 4px 20px 12px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .sheet-title { font-size: 17px; font-weight: 700; line-height: 1.25; }
  .sheet-sub { font-size: 12px; color: var(--ink-2); margin-top: 4px; display: flex; align-items: center; gap: 8px; }
  .sheet-body { padding: 16px 20px; overflow-y: auto; flex: 1; }
  .sheet-foot { padding: 12px 20px calc(16px + env(safe-area-inset-bottom)); border-top: 1px solid var(--border); display: flex; gap: 10px; flex-shrink: 0; background: var(--surface); }

  /* FORM */
  .field { margin-bottom: 18px; }
  .field-lbl { font-size: 12px; font-weight: 500; color: var(--ink-2); margin-bottom: 6px; display: block; }
  .field-row { display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-s); }
  .field-row input { flex: 1; min-width: 0; background: transparent; border: none; outline: none; font-size: 16px; font-weight: 500; font-family: 'DM Mono', monospace; }
  .field-row input::-webkit-outer-spin-button, .field-row input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .field-row input[type=number] { -moz-appearance: textfield; }
  .field-label-inline { font-size: 13px; color: var(--ink-2); white-space: nowrap; }
  .field-label-inline strong { color: var(--ink); font-weight: 500; }
  .qty-format-row { display: grid; grid-template-columns: 60px 1fr auto; gap: 8px; align-items: center; margin-bottom: 8px; padding: 10px 12px; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-s); }
  .qty-format-label { font-size: 13px; font-weight: 500; color: var(--ink); }
  .qty-format-row input { background: transparent; border: none; outline: none; font-size: 16px; font-weight: 500; font-family: 'DM Mono', monospace; width: 100%; }
  .qty-format-sub { font-size: 11px; color: var(--ink-3); font-family: 'DM Mono', monospace; text-align: right; min-width: 50px; }

  .check { display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-s); cursor: pointer; }
  .check input { width: 20px; height: 20px; accent-color: var(--accent); margin: 0; }
  .check-lbl { font-size: 14px; font-weight: 500; }
  .check.on { background: var(--accent-soft); border-color: var(--accent); }

  .carton-box { margin-top: 10px; padding: 12px 14px; background: var(--accent-soft); border: 1px solid var(--accent); border-radius: var(--radius-s); }
  .carton-box .field { margin-bottom: 10px; }
  .carton-box .field:last-child { margin-bottom: 0; }
  .carton-box .field-row { background: #fff; }

  .result-box { padding: 14px 16px; background: var(--accent); color: #fff; border-radius: var(--radius); display: flex; align-items: center; justify-content: space-between; }
  .result-lbl { font-size: 12px; opacity: .85; }
  .result-val { font-size: 22px; font-weight: 700; font-family: 'DM Mono', monospace; }

  .btn-valid { flex: 1; padding: 14px; background: var(--accent); color: #fff; border-radius: var(--radius); font-weight: 500; font-size: 15px; }
  .btn-valid:active { background: var(--accent-dark); }
  .btn-valid:disabled { background: var(--border-strong); color: var(--ink-3); }
  .btn-cancel { padding: 14px 18px; background: var(--surface-2); color: var(--ink-2); border: 1px solid var(--border); border-radius: var(--radius); font-weight: 500; }
  .btn-delete { padding: 14px 18px; background: #fff; color: var(--danger); border: 1px solid #F4C0C0; border-radius: var(--radius); font-weight: 500; }

  /* CHIP edit */
  .edit-chip { display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px; background: var(--btl-soft); color: #854F0B; border-radius: 12px; font-size: 11px; font-weight: 700; letter-spacing: .5px; }

  /* ZONE PICKER */
  .zone-list { display: grid; gap: 8px; }
  .zone-option { padding: 14px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); display: flex; align-items: center; gap: 10px; font-weight: 500; }
  .zone-option.current { border-color: var(--accent); background: var(--accent-soft); color: var(--accent-dark); }
  .zone-option:active { background: var(--surface-2); }
  .zone-add { padding: 12px; background: transparent; border: 1px dashed var(--border-strong); border-radius: var(--radius); color: var(--ink-2); font-weight: 500; }

  /* EXPORT SUMMARY */
  .summary-card { padding: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 12px; }
  .summary-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; font-size: 14px; }
  .summary-row + .summary-row { border-top: 1px solid var(--border); }
  .summary-row .mono { font-weight: 500; }
  .summary-label { color: var(--ink-2); }
  .summary-strong { color: var(--ink); font-weight: 500; }

  /* MASCOTTE */
  .mascot-btn { position: fixed; bottom: calc(16px + env(safe-area-inset-bottom)); right: 16px; width: 60px; height: 60px; border-radius: 50%; background: var(--surface); border: 1px solid var(--border); box-shadow: var(--shadow-2); z-index: 30; display: grid; place-items: center; overflow: hidden; }
  .mascot-btn:active { transform: scale(.95); }
  .mascot-bubble { position: fixed; bottom: calc(86px + env(safe-area-inset-bottom)); right: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; box-shadow: var(--shadow-2); z-index: 29; font-size: 13px; max-width: 220px; display: none; }
  .mascot-bubble.open { display: block; animation: pop .25s; }
  @keyframes pop { from { opacity: 0; transform: translateY(8px);} to {opacity: 1; transform: translateY(0);} }
  .chat-panel { position: fixed; bottom: calc(86px + env(safe-area-inset-bottom)); right: 16px; width: min(360px, calc(100vw - 32px)); height: 60vh; max-height: 480px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-l); box-shadow: var(--shadow-2); z-index: 31; display: none; flex-direction: column; overflow: hidden; }
  .chat-panel.open { display: flex; }
  .chat-head { padding: 12px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .chat-head-av { width: 32px; height: 32px; border-radius: 50%; background: var(--accent-soft); overflow: hidden; display: grid; place-items: center; }
  .chat-head-t { flex: 1; }
  .chat-head-t b { display: block; font-size: 14px; font-weight: 500; }
  .chat-head-t span { font-size: 11px; color: var(--accent-dark); }
  .chat-close { width: 28px; height: 28px; border-radius: 50%; display: grid; place-items: center; color: var(--ink-2); font-size: 18px; }
  .chat-close:active { background: var(--surface-2); }
  .chat-msgs { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 8px; }
  .msg { max-width: 82%; padding: 8px 12px; border-radius: 14px; font-size: 14px; line-height: 1.35; }
  .msg-u { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 4px; }
  .msg-a { align-self: flex-start; background: var(--surface-2); color: var(--ink); border-bottom-left-radius: 4px; border: 1px solid var(--border); }
  .msg-a.typing { display: inline-flex; gap: 4px; padding: 12px; }
  .msg-a.typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--ink-3); animation: dot 1.2s infinite; }
  .msg-a.typing span:nth-child(2) { animation-delay: .2s; }
  .msg-a.typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes dot { 0%, 60%, 100% {opacity: .3;} 30% {opacity: 1;} }
  .chat-foot { padding: 10px; border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
  .chat-foot input { flex: 1; padding: 10px 14px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 20px; font-size: 14px; outline: none; }
  .chat-foot input:focus { border-color: var(--accent); }
  .chat-send { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); color: #fff; display: grid; place-items: center; font-size: 16px; flex-shrink: 0; }
  .chat-send:disabled { background: var(--border-strong); }

  /* TOAST */
  .toast { position: fixed; bottom: calc(90px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%) translateY(20px); background: var(--ink); color: #fff; padding: 10px 18px; border-radius: 100px; font-size: 13px; font-weight: 500; z-index: 100; opacity: 0; transition: all .25s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* MODAL CONFIRM */
  .confirm-sheet .sheet-body { padding: 20px; }
  .confirm-sheet p { margin: 0 0 16px; font-size: 15px; }
</style>
<!-- PWA -->
<link rel="manifest" href="./manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ITM">
<link rel="apple-touch-icon" href="./icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="./icon-512.png">
</head>
<body>

<header>
  <div class="logo">ITM</div>
  <div class="h-main">
    <div class="h-title">Inventaire</div>
    <div class="h-sub" id="hSubDate"></div>
  </div>
  <button class="zone-pill" id="btnZone" type="button">
    <span id="zoneLabel">Zone</span>
    <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 4l3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
</header>

<div class="tabs">
  <button class="tab active" data-tab="catalogue">Catalogue</button>
  <button class="tab" data-tab="session">Session <span class="badge" id="badgeSess">0</span></button>
  <button class="tab" data-tab="export">Export</button>
</div>

<main>
  <div class="view active" id="vCatalogue">
    <div class="search-wrap" style="position: relative;">
      <span class="search-ico">⌕</span>
      <input class="search" id="searchInput" type="search" placeholder="Rechercher un produit…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    </div>
    <div class="prod-list" id="prodList"></div>
  </div>

  <div class="view" id="vSession">
    <div class="sess-list" id="sessList">
      <div class="prod-empty">Aucune saisie pour l'instant.<br>Retourne au catalogue pour commencer.</div>
    </div>
  </div>

  <div class="view" id="vExport">
    <div class="sess-list" id="exportView"></div>
  </div>
</main>

<!-- Sheet saisie produit -->
<div class="overlay" id="ovProd"></div>
<div class="sheet" id="shProd">
  <div class="sheet-handle"></div>
  <div class="sheet-head">
    <div class="sheet-title" id="shProdName">—</div>
    <div class="sheet-sub" id="shProdSub">—</div>
  </div>
  <div class="sheet-body" id="shProdBody"></div>
  <div class="sheet-foot" id="shProdFoot"></div>
</div>

<!-- Sheet zones -->
<div class="overlay" id="ovZone"></div>
<div class="sheet" id="shZone">
  <div class="sheet-handle"></div>
  <div class="sheet-head">
    <div class="sheet-title">Zone de comptage</div>
    <div class="sheet-sub">Sert à organiser la saisie. N'apparaît pas dans l'export.</div>
  </div>
  <div class="sheet-body">
    <div class="zone-list" id="zoneList"></div>
    <div style="margin-top: 14px;">
      <button class="zone-add" id="btnAddZone" style="width: 100%;" type="button">+ Ajouter une zone</button>
    </div>
  </div>
</div>

<!-- Sheet nouvelle zone -->
<div class="overlay" id="ovNewZone"></div>
<div class="sheet" id="shNewZone">
  <div class="sheet-handle"></div>
  <div class="sheet-head">
    <div class="sheet-title">Nouvelle zone</div>
  </div>
  <div class="sheet-body">
    <div class="field">
      <label class="field-lbl">Nom de la zone</label>
      <div class="field-row">
        <input id="newZoneInput" type="text" placeholder="ex: Cave, Terrasse, Cuisine…" autocomplete="off">
      </div>
    </div>
  </div>
  <div class="sheet-foot">
    <button class="btn-cancel" id="newZoneCancel" type="button">Annuler</button>
    <button class="btn-valid" id="newZoneOk" type="button">Créer</button>
  </div>
</div>

<!-- Sheet confirm -->
<div class="overlay" id="ovConfirm"></div>
<div class="sheet confirm-sheet" id="shConfirm">
  <div class="sheet-handle"></div>
  <div class="sheet-head">
    <div class="sheet-title" id="confirmTitle">Confirmer</div>
  </div>
  <div class="sheet-body">
    <p id="confirmMsg">—</p>
  </div>
  <div class="sheet-foot">
    <button class="btn-cancel" id="confirmNo" type="button">Annuler</button>
    <button class="btn-valid" id="confirmYes" type="button">Confirmer</button>
  </div>
</div>

<!-- Mascotte -->
<button class="mascot-btn" id="mascotBtn" type="button" aria-label="Assistant">
  <img src="./mascot.png" alt="Assistant" style="width:100%;height:100%;object-fit:cover;object-position:center top;">
</button>

<div class="mascot-bubble" id="mascotBubble">Besoin d'un coup de main ?</div>

<div class="chat-panel" id="chatPanel">
  <div class="chat-head">
    <div class="chat-head-av">
        <img src="./mascot.png" alt="" style="width:100%;height:100%;object-fit:cover;object-position:center top;">
      </div>
    <div class="chat-head-t">
      <b>Assistant ITM</b>
      <span>• en ligne</span>
    </div>
    <button class="chat-close" id="chatClose" type="button">✕</button>
  </div>

<script>
/* === ITM APP === */
(function(){
'use strict';

/* ---------- Catalogue ---------- */
const RAW = JSON.parse(document.getElementById('CATDATA').textContent);
const CATALOGUE = RAW.map((p, i) => ({
  id: i,
  y: p.y,         // nom Yokitup exact (export)
  s: p.s,         // nom court (recherche / affichage)
  c: p.c,         // catégorie
  q: p.q,         // quantité conditionnement (75)
  u: p.u,         // unité conditionnement (cL, L, unit)
  n: p.n,         // nom conditionnement (Bouteille, Magnum...)
  e: p.e,         // 'btl' ou 'litre'
  _search: (p.s + ' ' + p.y + ' ' + p.c).toLowerCase()
}));

/* ---------- State ---------- */
const LS_KEY = 'itm_session_v8';
const LS_ZONES = 'itm_zones_v8';
const LS_CHAT = 'itm_chat_v8';

const DEFAULT_ZONES = ['Bar', 'Cave', 'Terrasse', 'Cuisine', 'Réserve'];

let state = loadState();
let zones = loadZones();
let chatMsgs = [];

function loadState(){
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e){}
  return {
    estab: 'Indie Beach',
    currentZone: 'Bar',
    date: new Date().toISOString().slice(0,10),
    lines: []  // { id, productId, zone, qty, unit: 'btl'|'litre', details: [{format, qty}] | null, carton: {active, nb, pieces, format} | null, total }
  };
}
function loadZones(){
  try {
    const raw = localStorage.getItem(LS_ZONES);
    if (raw) { const z = JSON.parse(raw); if (Array.isArray(z) && z.length) return z; }
  } catch(e){}
  return DEFAULT_ZONES.slice();
}
function saveState(){ localStorage.setItem(LS_KEY, JSON.stringify(state)); }
function saveZones(){ localStorage.setItem(LS_ZONES, JSON.stringify(zones)); }

/* ---------- Utils ---------- */
function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function round(v, d){ const k = Math.pow(10, d||3); return Math.round(v*k)/k; }
function fmtQty(v){
  if (v == null || isNaN(v)) return '—';
  const n = Number(v);
  if (Number.isInteger(n)) return String(n);
  return n.toFixed(n < 1 ? 3 : 2).replace(/\.?0+$/, '');
}
function fmtDate(iso){
  const d = new Date(iso);
  return d.toLocaleDateString('fr-FR', {day: '2-digit', month: 'long', year: 'numeric'});
}

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._h);
  t._h = setTimeout(() => t.classList.remove('show'), 1800);
}

/* ---------- Sheets (bottom sheets) ---------- */
function openSheet(sheetId, overlayId){
  document.getElementById(overlayId).classList.add('open');
  document.getElementById(sheetId).classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeSheet(sheetId, overlayId){
  document.getElementById(overlayId).classList.remove('open');
  document.getElementById(sheetId).classList.remove('open');
  document.body.style.overflow = '';
}
function closeAllSheets(){
  ['shProd','shZone','shNewZone','shConfirm'].forEach(id => document.getElementById(id).classList.remove('open'));
  ['ovProd','ovZone','ovNewZone','ovConfirm'].forEach(id => document.getElementById(id).classList.remove('open'));
  document.body.style.overflow = '';
}

/* ---------- Header ---------- */
function renderHeader(){
  document.getElementById('hSubDate').textContent = state.estab + ' · ' + fmtDate(state.date);
  document.getElementById('zoneLabel').textContent = state.currentZone;
}

/* ---------- Tabs ---------- */
function switchTab(name){
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('v' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
  if (name === 'session') renderSession();
  if (name === 'export') renderExport();
  // scroll reset
  document.querySelector('main').scrollTop = 0;
}

/* ---------- Catalogue list ---------- */
let searchTerm = '';
function normalize(s){ return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, ''); }

function searchProducts(term){
  const t = normalize(term.trim());
  if (!t) return CATALOGUE;
  const words = t.split(/\s+/).filter(Boolean);
  return CATALOGUE.filter(p => {
    const s = normalize(p._search);
    return words.every(w => s.includes(w));
  });
}

function isProductSaisi(productId){
  return state.lines.some(l => l.productId === productId);
}

function renderCatalogue(){
  const list = searchProducts(searchTerm);
  const root = document.getElementById('prodList');

  if (!list.length){
    root.innerHTML = '<div class="prod-empty">Aucun produit trouvé.</div>';
    return;
  }

  // Grouper par catégorie
  const byCat = {};
  list.forEach(p => {
    const k = cleanCat(p.c);
    if (!byCat[k]) byCat[k] = [];
    byCat[k].push(p);
  });

  const orderedCats = Object.keys(byCat).sort((a,b) => {
    if (a === 'Autre') return 1;
    if (b === 'Autre') return -1;
    return a.localeCompare(b);
  });

  let html = '';
  orderedCats.forEach(cat => {
    html += `<div class="prod-cat-title">${escape(cat)}</div>`;
    byCat[cat].forEach(p => {
      const saisi = isProductSaisi(p.id) ? ' prod-saisi' : '';
      const tag = p.e === 'btl'
        ? '<span class="prod-tag tag-btl">BTL</span>'
        : '<span class="prod-tag tag-lit">LIT</span>';
      html += `<div class="prod${saisi}" data-pid="${p.id}">
        <div class="prod-name">${escape(p.s)}</div>
        ${tag}
      </div>`;
    });
  });

  root.innerHTML = html;
  root.querySelectorAll('.prod').forEach(el => {
    el.addEventListener('click', () => openProductSheet(parseInt(el.dataset.pid)));
  });
}

function cleanCat(c){
  if (!c) return 'Autre';
  // Transformer "LIQUIDE - ALCOOL - VIN - ROUGE BOURGOGNE" en "Vin rouge Bourgogne"
  const parts = c.split(' - ').map(s => s.trim()).filter(Boolean);
  if (parts.length === 0) return 'Autre';
  // drop first "LIQUIDE" or "SOLIDE" or "CONSOMMABLE"
  let p = parts.slice();
  if (['LIQUIDE','SOLIDE','CONSOMMABLE'].includes(p[0])) p = p.slice(1);
  if (p.length === 0) return 'Autre';
  // dernier niveau
  const last = p[p.length - 1];
  // Convertir "ROUGE BOURGOGNE" en "Rouge Bourgogne"
  return last.split(' ').map(w => w.charAt(0) + w.slice(1).toLowerCase()).join(' ');
}

function escape(s){
  return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

/* ---------- Product sheet ---------- */
let currentProduct = null;
let editingLineId = null;
let draft = null;  // draft de saisie

const FORMATS_LITRE = [
  {label: '50cl', cl: 50},
  {label: '70cl', cl: 70},
  {label: '75cl', cl: 75},
  {label: '100cl', cl: 100}
];

function openProductSheet(productId, lineId){
  currentProduct = CATALOGUE[productId];
  editingLineId = lineId || null;

  // Init draft
  if (lineId){
    const line = state.lines.find(l => l.id === lineId);
    draft = JSON.parse(JSON.stringify(line));
  } else {
    draft = {
      id: null,
      productId: productId,
      zone: state.currentZone,
      unit: currentProduct.e,
      qty: 0,
      details: currentProduct.e === 'litre' ? FORMATS_LITRE.map(f => ({format: f.label, cl: f.cl, qty: 0})) : null,
      carton: {active: false, nb: 0, pieces: 0, format: '75cl'},
      total: 0
    };
  }

  renderProductSheet();
  openSheet('shProd', 'ovProd');
}

function renderProductSheet(){
  const p = currentProduct;

  // Header
  document.getElementById('shProdName').textContent = p.s;
  const sub = document.getElementById('shProdSub');
  const modeChip = editingLineId ? '<span class="edit-chip">Modification</span>' : '';
  const tag = p.e === 'btl'

    : '<span class="prod-tag tag-lit">Export : litres</span>';

        </div>
      </div>
    `;
  } else {
    // Plusieurs lignes de format
    html += `<div class="field">
      <label class="field-lbl">Quantité par format de bouteille</label>`;
    FORMATS_LITRE.forEach((f, idx) => {
      const detail = draft.details.find(d => d.label === f.label) || {qty: 0};
      html += `
        <div class="qty-format-row">
          <div class="qty-format-label">× ${f.label}</div>
          <input type="number" step="0.1" inputmode="decimal" data-format="${f.label}" value="${detail.qty || ''}" placeholder="0">
          <div class="qty-format-sub" data-sub="${f.label}">—</div>
        </div>
      `;
    });
    html += `</div>`;
  }

  // Carton (pour tous les produits)
  const cartonOn = draft.carton.active ? 'on' : '';
  html += `
    <label class="check ${cartonOn}" id="cartonCheck">
      <input type="checkbox" id="fCarton" ${draft.carton.active ? 'checked' : ''}>
      <span class="check-lbl">Ajouter des cartons</span>
    </label>
    <div id="cartonBox" style="display:${draft.carton.active ? 'block' : 'none'}">
      <div class="carton-box">
        <div class="field">
          <label class="field-lbl">Nombre de cartons</label>
          <div class="field-row">
            <input id="fCartonNb" type="number" step="1" inputmode="numeric" value="${draft.carton.nb || ''}" placeholder="ex: 2">
            <span class="field-label-inline">cartons</span>
          </div>
        </div>
        <div class="field">
          <label class="field-lbl">Pièces par carton</label>
          <div class="field-row">
            <input id="fCartonPieces" type="number" step="1" inputmode="numeric" value="${draft.carton.pieces || ''}" placeholder="ex: 6">
            <span class="field-label-inline">btl/carton</span>
          </div>
        </div>
        ${p.e === 'litre' ? `
        <div class="field" style="margin-bottom:0">
          <label class="field-lbl">Format des bouteilles dans le carton</label>
          <div class="field-row" style="padding: 4px 6px">
            <div style="display: flex; gap: 4px; width: 100%">
              ${FORMATS_LITRE.map(f => `
                <label style="flex:1; display:block; text-align:center; padding:8px 0; border-radius:6px; background:${draft.carton.format === f.label ? 'var(--accent)' : 'transparent'}; color:${draft.carton.format === f.label ? '#fff' : 'var(--ink-2)'}; font-weight:500; font-size:13px; cursor:pointer">
                  <input type="radio" name="cartonFormat" value="${f.label}" ${draft.carton.format === f.label ? 'checked' : ''} style="display:none">

  // Total
  html += `<div style="margin-top: 18px;">

function updateDraftFromInputs(){
  const p = currentProduct;

  if (p.e === 'btl'){
    const v = parseFloat(document.getElementById('fQty').value) || 0;
    draft.qty = v;
  } else {
    draft.details.forEach(d => {
      const el = document.querySelector(`input[data-format="${d.label}"]`);
      d.qty = el ? (parseFloat(el.value) || 0) : 0;
    });
  }

  const cnb = document.getElementById('fCartonNb');
  const cpc = document.getElementById('fCartonPieces');
  if (cnb) draft.carton.nb = parseFloat(cnb.value) || 0;
  if (cpc) draft.carton.pieces = parseFloat(cpc.value) || 0;

  computeTotal();
  renderSubs();
  renderTotal();
}

function computeTotal(){
  const p = currentProduct;

  if (p.e === 'btl'){
    // Export en bouteilles : qty + cartons
    let btl = draft.qty || 0;
    if (draft.carton.active){
      btl += (draft.carton.nb || 0) * (draft.carton.pieces || 0);
    }
    draft.total = round(btl, 3);
  } else {
    // Export en litres
    let cl = 0;
    draft.details.forEach(d => {
      cl += (d.qty || 0) * d.cl;
    });
    if (draft.carton.active){
      const fmt = FORMATS_LITRE.find(f => f.label === draft.carton.format);
      if (fmt){
        cl += (draft.carton.nb || 0) * (draft.carton.pieces || 0) * fmt.cl;
      }
    }
    draft.total = round(cl / 100, 3);  // L
  }
}

function renderSubs(){
  const p = currentProduct;
  if (p.e !== 'litre') return;
  draft.details.forEach(d => {
    const el = document.querySelector(`[data-sub="${d.label}"]`);
    if (!el) return;
    const litres = (d.qty || 0) * d.cl / 100;
    el.textContent = litres > 0 ? round(litres, 3) + 'L' : '—';
  });
}

function renderTotal(){
  const el = document.getElementById('resultVal');
  if (!el) return;
  const p = currentProduct;
  const t = draft.total;
  if (!t) { el.textContent = '—'; return; }
  el.textContent = p.e === 'btl' ? fmtQty(t) + ' btl' : fmtQty(t) + ' L';
}

function saveLine(){
  if (!draft.total || draft.total <= 0){
    toast('Saisis au moins une quantité');
    return;
  }

  if (editingLineId){
    const idx = state.lines.findIndex(l => l.id === editingLineId);
    if (idx >= 0){
      draft.id = editingLineId;
      state.lines[idx] = draft;
    }
    toast('Modifié');
  } else {
    draft.id = uid();
    state.lines.push(draft);
    toast('Ajouté');
  }

  saveState();
  renderCatalogue();
  updateBadge();
  closeSheet('shProd','ovProd');
}

function deleteLine(){
  if (!editingLineId) return;
  state.lines = state.lines.filter(l => l.id !== editingLineId);
  saveState();
  renderCatalogue();
  renderSession();
  updateBadge();
  toast('Supprimé');
  closeSheet('shProd','ovProd');
}

/* ---------- Session view ---------- */
function renderSession(){
  const root = document.getElementById('sessList');
  if (!state.lines.length){
    root.innerHTML = '<div class="prod-empty">Aucune saisie pour l\'instant.<br>Retourne au catalogue pour commencer.</div>';
    return;
  }

  // Grouper par zone
  const byZone = {};
  state.lines.forEach(l => {
    if (!byZone[l.zone]) byZone[l.zone] = [];
    byZone[l.zone].push(l);
  });

  // Ordre zones : zone courante d'abord, puis les autres dans l'ordre de zones
  const sortedZones = Object.keys(byZone).sort((a, b) => {
    if (a === state.currentZone) return -1;
    if (b === state.currentZone) return 1;
    return zones.indexOf(a) - zones.indexOf(b);
  });

  let html = '';
  sortedZones.forEach(z => {
    const items = byZone[z];
    html += `<div class="sess-zone">${escape(z)} <span class="sess-zone-count">${items.length}</span></div>`;
    items.forEach(l => {
      const p = CATALOGUE[l.productId];
      const detail = describeLine(l, p);
      html += `<div class="sess-item" data-lid="${l.id}" data-pid="${l.productId}">
        <div class="sess-body">
          <div class="sess-name">${escape(p.s)}</div>
          <div class="sess-detail">${detail}</div>
        </div>
        <button class="sess-del" data-del="${l.id}" type="button" aria-label="Supprimer">✕</button>
      </div>`;
    });
  });

  root.innerHTML = html;
  root.querySelectorAll('.sess-item').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.closest('[data-del]')) return;
      const pid = parseInt(el.dataset.pid);
      const lid = el.dataset.lid;
      openProductSheet(pid, lid);
    });
  });
  root.querySelectorAll('[data-del]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const lid = el.dataset.del;
      state.lines = state.lines.filter(l => l.id !== lid);
      saveState();
      renderSession();
      renderCatalogue();
      updateBadge();
      toast('Supprimé');
    });
  });
}

function describeLine(l, p){
  let parts = [];

  if (p.e === 'btl'){
    const base = l.qty || 0;
    if (base > 0) parts.push(`<span class="mono">${fmtQty(base)} btl</span>`);
    if (l.carton && l.carton.active && l.carton.nb && l.carton.pieces){
      parts.push(`<span class="mono">${fmtQty(l.carton.nb)} ctn × ${fmtQty(l.carton.pieces)}</span>`);
    }
  } else {
    (l.details || []).forEach(d => {
      if (d.qty > 0){
        parts.push(`<span class="mono">${fmtQty(d.qty)} × ${d.label}</span>`);
      }
    });
    if (l.carton && l.carton.active && l.carton.nb && l.carton.pieces){
      parts.push(`<span class="mono">${fmtQty(l.carton.nb)} ctn × ${fmtQty(l.carton.pieces)} (${l.carton.format})</span>`);
    }
  }

  const total = p.e === 'btl'
    ? `<span class="summary-strong mono">= ${fmtQty(l.total)} btl</span>`
    : `<span class="summary-strong mono">= ${fmtQty(l.total)} L</span>`;

  return parts.join(' · ') + ' · ' + total;
}

function updateBadge(){
  document.getElementById('badgeSess').textContent = state.lines.length;
}

/* ---------- Export view ---------- */
function renderExport(){
  const root = document.getElementById('exportView');
  if (!state.lines.length){
    root.innerHTML = '<div class="prod-empty">Aucune saisie à exporter.</div>';
    return;
  }

  // Agrégation par produit (zones confondues)
  const agg = {};
  state.lines.forEach(l => {
    const p = CATALOGUE[l.productId];
    const key = p.y; // nom Yokitup exact
    if (!agg[key]){
      agg[key] = { product: p, total: 0, zones: new Set(), count: 0 };
    }
    agg[key].total = round(agg[key].total + l.total, 3);
    agg[key].zones.add(l.zone);
    agg[key].count++;
  });

  const entries = Object.values(agg);
  const totalLignes = entries.length;
  const totalBtl = entries.filter(e => e.product.e === 'btl').reduce((s,e) => s + e.total, 0);
  const totalLit = entries.filter(e => e.product.e === 'litre').reduce((s,e) => s + e.total, 0);

  let html = `
    <div class="summary-card">
      <div class="summary-row"><span class="summary-label">Établissement</span><span class="summary-strong">${escape(state.estab)}</span></div>
      <div class="summary-row"><span class="summary-label">Date</span><span class="summary-strong mono">${state.date}</span></div>
      <div class="summary-row"><span class="summary-label">Zones saisies</span><span class="summary-strong mono">${new Set(state.lines.map(l => l.zone)).size}</span></div>
      <div class="summary-row"><span class="summary-label">Lignes d'export (produits uniques)</span><span class="summary-strong mono">${totalLignes}</span></div>
      <div class="summary-row"><span class="summary-label">Total bouteilles</span><span class="summary-strong mono">${round(totalBtl,2)}</span></div>
      <div class="summary-row"><span class="summary-label">Total litres</span><span class="summary-strong mono">${round(totalLit,2)}</span></div>
    </div>

    <div style="display: flex; gap: 8px; margin-bottom: 16px;">
      <button class="btn-primary" id="btnExportCsv" style="flex:1; justify-content:center" type="button">Télécharger le CSV Yokitup</button>
    </div>

    <div style="display: flex; gap: 8px; margin-bottom: 16px;">
      <button class="btn-sec" id="btnResetSession" style="flex:1" type="button">Terminer & réinitialiser</button>
    </div>

    <div class="prod-cat-title" style="padding-left:0">Aperçu des lignes exportées</div>
  `;

  entries.sort((a,b) => a.product.s.localeCompare(b.product.s));
  entries.forEach(e => {
    const u = e.product.e === 'btl' ? 'btl' : 'L';
    const zonesTxt = Array.from(e.zones).join(' + ');
    html += `<div class="sess-item">
      <div class="sess-body">
        <div class="sess-name">${escape(e.product.s)}</div>
        <div class="sess-detail mono" style="font-size:11px; color:var(--ink-3); margin-top:4px">${escape(e.product.y)}</div>
        <div class="sess-detail">Zones: ${escape(zonesTxt)} · <span class="summary-strong mono">${fmtQty(e.total)} ${u}</span></div>
      </div>
    </div>`;
  });

  root.innerHTML = html;

  document.getElementById('btnExportCsv').addEventListener('click', exportCsv);
  document.getElementById('btnResetSession').addEventListener('click', askResetSession);
}

function exportCsv(){
  const agg = {};
  state.lines.forEach(l => {
    const p = CATALOGUE[l.productId];
    const key = p.y;
    if (!agg[key]){ agg[key] = { product: p, total: 0 }; }
    agg[key].total = round(agg[key].total + l.total, 3);
  });

  let csv = 'product_name,quantity\n';
  Object.values(agg).forEach(e => {
    const name = e.product.y;
    const needsQuotes = /[,"\n]/.test(name);
    const safe = needsQuotes ? '"' + name.replace(/"/g, '""') + '"' : name;
    csv += safe + ',' + fmtQty(e.total) + '\n';
  });

  const fname = state.estab.replace(/\s+/g, '_') + '_' + state.date + '.csv';
  const blob = new Blob(['\ufeff' + csv], {type: 'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = fname;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);

  toast('CSV téléchargé');
}

function askResetSession(){
  openConfirm('Terminer la session ?',
    `Vas-tu vraiment réinitialiser la session ? Tes ${state.lines.length} saisies seront effacées. Exporte d'abord le CSV si besoin.`,
    () => {
      state.lines = [];
      state.date = new Date().toISOString().slice(0,10);
      saveState();
      renderHeader();
      updateBadge();
      renderExport();
      renderCatalogue();
      toast('Session réinitialisée');
    });
}

    addChatMsg('assistant', "Salut 👋 Je suis là pour t'aider pendant ton inventaire. Une question ?");

}
function closeChat(){ document.getElementById('chatPanel').classList.remove('open'); }

function addChatMsg(role, text){
  chatMsgs.push({role, text});
  const root = document.getElementById('chatMsgs');
  const div = document.createElement('div');
  div.className = 'msg ' + (role === 'user' ? 'msg-u' : 'msg-a');
  div.textContent = text;
  root.appendChild(div);
  root.scrollTop = root.scrollHeight;
  return div;
}

async function sendChat(){
  const input = document.getElementById('chatInput');
  const txt = input.value.trim();
  if (!txt) return;
  input.value = '';
  addChatMsg('user', txt);

  // Typing indicator
  const root = document.getElementById('chatMsgs');
  const t = document.createElement('div');
  t.className = 'msg msg-a typing';
  t.innerHTML = '<span></span><span></span><span></span>';
  root.appendChild(t);
  root.scrollTop = root.scrollHeight;

  const system = `Tu es l'assistant ITM pour Indie Group (groupe de restaurants Saint-Tropez, Paris, Saint-Barth, Megève, Courchevel).
L'utilisateur fait un inventaire sur le terrain. Tu l'aides sur :
- les règles de comptage (bouteilles pleines + entamées en décimal)
- les formats de bouteilles (50/70/75/100cl)
- la logique cartons
- les conditionnements (Magnum = 150cl, Jéroboam = 300cl, Mathusalem = 600cl, Nabuchodonosor = 1500cl)
Réponds en français, tutoie, maximum 2-3 phrases, ton direct et terrain. Pas de politesse inutile.`;

  try {
    const r = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 250,
        system: system,
        messages: chatMsgs.slice(-6).map(m => ({role: m.role, content: m.text}))
      })
    });
    const data = await r.json();
    t.remove();
    const reply = data.content?.[0]?.text || 'Désolé, je n\'ai pas pu répondre.';
    addChatMsg('assistant', reply);
  } catch (e) {
    t.remove();
    addChatMsg('assistant', 'Connexion impossible. Réessaie dans un instant.');
  }
}

  // Overlays
  document.getElementById('ovProd').addEventListener('click', () => closeSheet('shProd','ovProd'));
  document.getElementById('ovZone').addEventListener('click', () => closeSheet('shZone','ovZone'));
  document.getElementById('ovNewZone').addEventListener('click', () => closeSheet('shNewZone','ovNewZone'));
  document.getElementById('ovConfirm').addEventListener('click', () => closeSheet('shConfirm','ovConfirm'));

  // Confirm
  document.getElementById('confirmNo').addEventListener('click', () => closeSheet('shConfirm','ovConfirm'));
  document.getElementById('confirmYes').addEventListener('click', () => {
    const cb = confirmCb;
    confirmCb = null;
    closeSheet('shConfirm','ovConfirm');
    if (cb) cb();
  });

  // Mascotte
  const bubble = document.getElementById('mascotBubble');
  setTimeout(() => bubble.classList.add('open'), 1200);
  setTimeout(() => bubble.classList.remove('open'), 6000);
  document.getElementById('mascotBtn').addEventListener('click', openChat);
  document.getElementById('chatClose').addEventListener('click', closeChat);
  document.getElementById('chatSend').addEventListener('click', sendChat);
  document.getElementById('chatInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendChat();
  });
}

document.addEventListener('DOMContentLoaded', init);
})();
</script>
<script>
// Enregistrement du service worker pour l'offline
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then((reg) => console.log('SW registered:', reg.scope))
      .catch((err) => console.warn('SW registration failed:', err));
  });
}
</script>
